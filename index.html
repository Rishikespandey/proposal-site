<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Valentine's Proposal 💖</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700;800&family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Background floating hearts container -->
    <div class="floating-hearts" id="floatingHearts"></div>

    <!-- Main Proposal Card -->
    <div class="proposal-container" id="proposalContainer">
        <div class="proposal-card">
            <div class="name-section">
                <h1 class="girl-name">Hey Girl<span class="heart-icon">❤️</span></h1>
            </div>
            <p class="question-text">Will you be my Girlfriend?</p>
            <div class="button-group">
                <button class="btn btn-yes" id="yesButton">Yes ❤️</button>
                <button class="btn btn-no" id="noButton">No 😏</button>
            </div>
        </div>
    </div>

    <!-- Celebration overlay for heart burst and kissing couple -->
    <div class="celebration-overlay" id="celebrationOverlay" style="display: none;">
        <div class="kissing-couple" id="kissingCouple">
            <div class="couple-emoji">👦</div>
            <div class="kiss-spark">💋</div>
            <div class="couple-emoji">👧</div>
        </div>
        <div class="heart-burst-container" id="heartBurstContainer"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
